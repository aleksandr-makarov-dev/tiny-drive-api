services:
  tinydrive.api:
    image: tinydrive.api
    build:
      context: .
      dockerfile: src/TinyDrive.API/Dockerfile
  tinydrive.postgres:
    image: postgres:17
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: tiny_drive

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "5432:5432"

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

        
    

